<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile con angoli arrotondati e corner trasparenti -->
  <rect x="96" y="96" width="832" height="832" rx="190" ry="190" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Onda "pulse" (ECG) bianca: il battito del lavoro -->
  <polyline
    points="170,540 330,540 400,540 452,360 540,690 600,470 656,540 720,540 854,540"
    fill="none" stroke="#ffffff" stroke-width="46"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Punto luminoso sul picco, come un "now" che scorre -->
  <circle cx="540" cy="690" r="34" fill="#ffffff"/>
  <circle cx="540" cy="690" r="60" fill="#ffffff" opacity="0.25"/>
</svg>
